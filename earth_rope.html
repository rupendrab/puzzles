<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Rope to Space</title>
  <link rel="icon" type="image/png" href="Wise_Man_Icon.png">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.11/dist/index.global.min.js"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const EARTH_RADIUS_KM = 6378;
    const GEO_ALTITUDE_KM = 35786;
    const GEO_RADIUS_KM = EARTH_RADIUS_KM + GEO_ALTITUDE_KM;
    const REQUIRED_ROPE_KM = 143781;
    const TOO_LONG_ROPE_KM = 144000;
    const MIN_ROPE_KM = 10000;
    const MAX_ROPE_KM = 300000;

    function fmt(n) {
      return Math.round(n).toLocaleString();
    }

    function App() {
      const [ropeKm, setRopeKm] = useState(35000);
      const [isMobile, setIsMobile] = useState(window.innerWidth < 640);
      const tooLong = ropeKm > TOO_LONG_ROPE_KM;
      const ok = ropeKm >= REQUIRED_ROPE_KM && !tooLong;

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 640);
        window.addEventListener("resize", handleResize);
        return () => window.removeEventListener("resize", handleResize);
      }, []);

      const view = useMemo(() => {
        const earthR = 90;
        const cx = 500;
        const cy = 500;
        const maxVisibleKm = EARTH_RADIUS_KM + MAX_ROPE_KM;
        const pxPerKm = 400 / maxVisibleKm;
        const geoR = GEO_RADIUS_KM * pxPerKm;
        const ropePx = ropeKm * pxPerKm;
        const topY = cy - earthR - ropePx;
        return { earthR, cx, cy, geoR, topY };
      }, [ropeKm]);

      const topIconY = Math.max(35, view.topY);
      const viewBox = isMobile ? "100 70 800 540" : "0 0 1000 650";

      return (
        <div className="min-h-screen bg-slate-50 p-6 text-slate-950">
          <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-[330px_1fr] gap-6">
            <aside className="space-y-4">
              <h1 className="text-4xl font-bold">The Rope to Space</h1>

              <div className="bg-white rounded-2xl border p-5 shadow-sm">
                <div className="font-semibold">Rope length above Earth</div>
                <div className="text-4xl font-bold text-blue-700 mt-3">
                  {fmt(ropeKm)} km
                </div>

                <input
                  className="w-full mt-6 accent-blue-600"
                  type="range"
                  min={MIN_ROPE_KM}
                  max={MAX_ROPE_KM}
                  step="1000"
                  value={ropeKm}
                  onChange={e => setRopeKm(Number(e.target.value))}
                />

                <div className="flex justify-between text-sm mt-2">
                  <span>10,000 km</span>
                  <span>300,000 km</span>
                </div>
              </div>

              <div className={`rounded-2xl border p-5 ${ok ? "bg-green-50" : "bg-slate-100"}`}>
                <div className="flex items-center gap-3">
                  <div className={`h-11 w-11 rounded-full text-white grid place-items-center text-3xl ${ok ? "bg-green-600" : "bg-black"}`}>
                      {ok ? "✓" : tooLong ? "!" : "×"}
                  </div>
                  <div>
                      {tooLong
                        ? "Too long — shorten the rope."
                        : ok
                          ? "OK — long enough for equilibrium."
                          : "Too short — extend the rope."}
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-2xl border p-5 shadow-sm space-y-2">
                <h2 className="text-xl font-bold">Key values</h2>
                <p>Earth radius: <b>{fmt(EARTH_RADIUS_KM)} km</b></p>
                <p>Geo orbit altitude: <b>{fmt(GEO_ALTITUDE_KM)} km</b></p>
                <p>Geo orbit radius: <b>{fmt(GEO_RADIUS_KM)} km</b></p>
                <p>Required rope: <b>≈ {fmt(REQUIRED_ROPE_KM)} km</b></p>
              </div>
            </aside>

            <main className="bg-white rounded-3xl border shadow-sm overflow-hidden">
              <svg viewBox={viewBox} preserveAspectRatio="xMidYMid meet" className="w-full h-[78vh] sm:h-[640px]">
                <defs>
                  <radialGradient id="earth" cx="35%" cy="30%" r="70%">
                    <stop offset="0%" stopColor="#8fd3ff" />
                    <stop offset="45%" stopColor="#1d69b7" />
                    <stop offset="100%" stopColor="#08234d" />
                  </radialGradient>

                  <pattern id="rope" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(35)">
                    <rect width="8" height="8" fill="#b7791f" />
                    <path d="M0 0 L0 8" stroke="#7c4700" strokeWidth="3" />
                  </pattern>
                </defs>

                <ellipse
                  cx={view.cx}
                  cy={view.cy}
                  rx={view.geoR * 2.2}
                  ry={view.geoR * 0.52}
                  fill="none"
                  stroke="#2563eb"
                  strokeWidth="2"
                  strokeDasharray="8 8"
                />

                <text x="710" y="430" fill="#1d4ed8" fontSize="18" fontWeight="700">
                  Geostationary Orbit
                </text>
                <text x="710" y="455" fill="#1d4ed8" fontSize="15">
                  35,786 km above Earth
                </text>

                <line
                  x1={view.cx}
                  y1={view.cy - view.earthR}
                  x2={view.cx}
                  y2={topIconY + 24}
                  stroke="url(#rope)"
                  strokeWidth="8"
                  strokeLinecap="round"
                />

                <g transform={`translate(${view.cx}, ${topIconY})`}>
                  <circle r="23" fill={ok ? "#16a34a" : "#000"} />
                  <text y="10" textAnchor="middle" fontSize="36" fill="white">
                    {ok ? "✓" : "×"}
                  </text>
                </g>

                <line x1="290" y1={view.cy} x2="710" y2={view.cy} stroke="#94a3b8" strokeWidth="2" strokeDasharray="8 8" />
                <text x="235" y={view.cy + 5} fill="#475569" fontSize="16" fontStyle="italic">Equator</text>

                <circle
                  cx={view.cx}
                  cy={view.cy}
                  r={view.earthR}
                  fill="url(#earth)"
                  stroke="#0f3a73"
                  strokeWidth="3"
                />

                <path d="M455 460 C420 470, 418 510, 450 525 C470 535, 485 505, 505 515 C530 528, 545 500, 525 478 C505 456, 485 450, 455 460Z" fill="#4ade80" opacity="0.75" />
                <path d="M528 420 C565 430, 580 455, 560 480 C545 495, 525 480, 535 455 C538 445, 525 438, 528 420Z" fill="#65a30d" opacity="0.75" />

                <line x1={view.cx} y1={view.cy} x2={view.cx + view.earthR} y2={view.cy} stroke="white" strokeWidth="4" />
                <text x={view.cx + 115} y={view.cy - 20} fill="#1d4ed8" fontSize="18" fontWeight="700">
                  Earth radius: 6,378 km
                </text>
              </svg>
            </main>
          </div>
          <footer className="max-w-7xl mx-auto mt-6 text-center text-sm text-slate-600">
            Rupendra Bandyopadhyay ·{" "}
            <a className="font-semibold text-blue-700 hover:underline" href="https://www.linkedin.com/in/rupendra/" target="_blank" rel="noreferrer">
              LinkedIn
            </a>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
