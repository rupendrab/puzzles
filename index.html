<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Puzzles</title>
  <link rel="icon" type="image/png" href="Wise_Man_Icon.png">
  <style>
    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #5a6777;
      --panel: #ffffff;
      --border: #d6d9df;
      --accent: #2f80ed;
      --shadow: 0 12px 30px rgba(24, 31, 42, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2f6;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 560px);
      display: grid;
      gap: 18px;
    }

    .site-footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .site-footer a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .site-footer a:hover,
    .site-footer a:focus-visible {
      text-decoration: underline;
    }

    header {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    nav {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    .menu {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .menu a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 54px;
      border-radius: 6px;
      color: var(--ink);
      font-weight: 750;
      text-decoration: none;
      padding: 0 16px;
    }

    .menu a::after {
      content: "Open";
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .menu a:hover,
    .menu a:focus-visible {
      background: #f7f9fc;
      outline: 3px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Puzzles</h1>
      <p>Select a page from the menu.</p>
    </header>

    <nav aria-label="Pages">
      <ul class="menu">
        <li><a href="chessboard.html">Chessboard</a></li>
        <li><a href="card_numbers.html">Card Numbers</a></li>
        <li><a href="earth_rope.html">Earth Rope</a></li>
        <li><a href="igni.html">In Girum Imus</a></li>
        <li><a href="palindromes.html">Palindromes</a></li>
        <li><a href="rotating_circles.html">Rotating Circles</a></li>
        <li><a href="slinky_drop.html">Slinky Drop</a></li>
        <li><a href="trees.html">Trees</a></li>
      </ul>
    </nav>
    <footer class="site-footer">
      Rupendra Bandyopadhyay ·
      <a href="https://www.linkedin.com/in/rupendra/" target="_blank" rel="noreferrer">LinkedIn</a>
    </footer>
  </main>
</body>
</html>
